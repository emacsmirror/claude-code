name: Publish Release

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Activate npm 11 via corepack (required for OIDC publishing)
      # OIDC trusted publishing needs npm >= 11.5.1.
      # We don't use `npm install -g npm@latest` because it has npm overwrite
      # its own modules mid-run and can crash with "Cannot find module
      # 'promise-retry'".
      # We don't use `corepack prepare npm@latest` because the `latest` tag
      # resolved through corepack on this runner returned npm 10.9.7, which
      # is too old for OIDC. Pin to an explicit OIDC-capable version instead.
      run: |
        corepack enable
        corepack prepare npm@11.6.0 --activate
        npm --version

    - name: Configure npm registry
      run: npm config set registry https://registry.npmjs.org/

    - name: Install dependencies
      run: |
        cd mcp-server
        npm ci

    - name: Build
      run: |
        cd mcp-server
        npm run build

    - name: Publish to npm
      run: |
        cd mcp-server
        npm publish --provenance --access public
    
  create-melpa-pr:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}
    
    - name: Create MELPA recipe
      run: |
        VERSION="${{ github.event.release.tag_name }}"
        cat > claude-code-emacs-recipe.el << EOF
        (claude-code-emacs
         :fetcher github
         :repo "yuya373/claude-code-emacs"
         :files ("*.el" (:exclude "test-*.el")))
        EOF
        
        echo "MELPA recipe created. Please submit this to MELPA manually:"
        cat claude-code-emacs-recipe.el
    
    - name: Upload MELPA recipe
      uses: actions/upload-artifact@v4
      with:
        name: melpa-recipe
        path: claude-code-emacs-recipe.el
